<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPL Feedback questionnaire</title>
  <style>
    :root {
      --red:#d71920; --navy:#013149; --blue:#006891; --green:#2eb895; --yellow:#fece17; --grey:#f8f8f8;
      --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --page:#f1f5f9; --white:#fff;
      --shadow:0 22px 45px rgba(15,23,42,.14); --soft:0 10px 24px rgba(15,23,42,.1);
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--page);color:var(--ink);font-family:"Replica Pro",Arial,Helvetica,sans-serif} button,textarea,input{font:inherit} button{cursor:pointer;border:0}
    .topbar{background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);box-shadow:var(--soft)}
    .topbar-inner{width:min(1700px,calc(100% - 40px));margin:0 auto;padding:16px 0;display:flex;align-items:center;justify-content:space-between;gap:22px}.brand-kicker{color:var(--red);font-weight:900;text-transform:uppercase;letter-spacing:.2em;font-size:clamp(.85rem,1.2vw,1.2rem)}.brand-title{font-weight:900;font-size:clamp(1.15rem,1.8vw,1.75rem);margin-top:2px}.progress-wrap{display:flex;align-items:center;gap:14px;min-width:320px}.progress-track{height:16px;flex:1;background:#e2e8f0;border-radius:999px;overflow:hidden}.progress-fill{height:100%;background:var(--red);border-radius:999px;transition:width .25s ease}.progress-number{font-size:1.15rem;font-weight:900;min-width:52px;text-align:right}
    .container{width:min(1700px,calc(100% - 32px));margin:0 auto;padding:26px 0 60px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}.tab{min-height:58px;min-width:64px;border:2px solid var(--line);border-radius:18px;background:#fff;font-weight:900;font-size:1.4rem;padding:0 18px}.tab.active{background:var(--red);color:#fff;border-color:var(--red);box-shadow:var(--soft)}.tab.done{background:var(--navy);color:#fff;border-color:var(--navy)}
    .screen{display:none;animation:fade .22s ease}.screen.active{display:block}@keyframes fade{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
    .card{background:#fff;border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden}.intro-card{min-height:calc(100vh - 180px);position:relative}.intro-blue{position:absolute;right:0;top:0;bottom:0;width:22%;background:var(--navy)}.intro-content{position:relative;z-index:1;min-height:calc(100vh - 180px);display:flex;flex-direction:column;justify-content:space-between;padding:clamp(34px,5vw,82px)}
    .kicker{color:var(--navy);font-size:clamp(1.3rem,2vw,2rem);font-weight:900;text-transform:uppercase;letter-spacing:.16em;margin:0 0 14px}.h1{font-size:clamp(4rem,8vw,8.2rem);line-height:.95;margin:0;font-weight:900;letter-spacing:-.05em;max-width:1050px}.intro-copy{font-size:clamp(1.5rem,2.3vw,2.3rem);line-height:1.35;color:var(--muted);font-weight:700;max-width:980px;margin:34px 0 0}.header{display:grid;grid-template-columns:1fr 280px;background:#fff}.header-main{padding:34px clamp(28px,4vw,58px)}.pill{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border-radius:999px;font-size:2rem;font-weight:900;padding:10px 22px;margin-bottom:20px}.title{font-size:clamp(3rem,5vw,5.8rem);line-height:.98;margin:0;font-weight:900;letter-spacing:-.04em}.subtitle{font-size:clamp(1.4rem,2vw,2rem);line-height:1.35;color:var(--muted);font-weight:700;max-width:1000px}.header-side{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px}.header-side .big{font-size:4rem;font-weight:900}.header-side .small{font-size:1.2rem;font-weight:800;opacity:.9}
    .body{padding:clamp(24px,3.5vw,50px)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}.tile{min-height:110px;border:2px solid var(--line);border-radius:26px;background:#fff;color:var(--ink);padding:24px;text-align:left;font-size:clamp(1.35rem,2vw,2rem);font-weight:900;box-shadow:0 5px 12px rgba(15,23,42,.06);transition:transform .15s ease,background .15s ease,border-color .15s ease}.tile:hover{transform:translateY(-2px);border-color:#fecaca;background:#fff5f5}.tile.selected{background:var(--red);border-color:var(--red);color:#fff;box-shadow:var(--soft)}.tile.disabled{background:#e5e7eb;color:#9ca3af;border-color:#d1d5db;box-shadow:none;cursor:not-allowed;transform:none}.tile .meta{display:block;font-size:1.1rem;line-height:1.35;font-weight:800;opacity:.86;margin-top:10px}.other-input{display:none;margin-top:20px;width:100%;min-height:82px;border:2px solid var(--line);border-radius:24px;background:#f8fafc;padding:18px 22px;font-size:1.8rem;font-weight:800;outline:none}.other-input.visible{display:block}.status{margin:0 0 24px;font-size:clamp(1.3rem,1.8vw,1.8rem);font-weight:900;color:var(--navy)}.notice{margin-top:18px;border-radius:22px;background:#fff7ed;border:2px solid #fed7aa;color:#9a3412;padding:18px 22px;font-size:1.35rem;font-weight:900;display:none}.notice.visible{display:block}
    .nav{margin-top:28px;background:#fff;border:1px solid var(--line);border-radius:30px;box-shadow:var(--soft);padding:18px;display:grid;grid-template-columns:1fr 2fr 1fr;gap:14px}.nav button{min-height:86px;border-radius:22px;font-size:clamp(1.35rem,2vw,2rem);font-weight:900}.back,.reset{background:#f8fafc;color:var(--ink)}.next,.start{background:var(--red);color:#fff}.finish{background:var(--green);color:#fff}.back:disabled{opacity:.35;cursor:not-allowed}
    textarea{width:100%;min-height:380px;border:2px solid var(--line);border-radius:30px;background:#f8fafc;padding:26px;font-size:clamp(1.5rem,2.2vw,2.2rem);font-weight:700;line-height:1.35;outline:none}.question-prompt{font-size:clamp(1.8rem,2.8vw,3rem);font-weight:900;line-height:1.15;margin:0 0 24px}.submit-status{font-size:clamp(1.4rem,2vw,2rem);font-weight:800;color:var(--muted);line-height:1.35;max-width:950px}.card-stack{display:grid;place-items:center;min-height:520px}.swipe-card{width:min(760px,100%);min-height:360px;background:#fff;border:3px solid var(--line);border-radius:38px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;touch-action:none;user-select:none}.swipe-card h2{font-size:clamp(2.7rem,5vw,5rem);line-height:1;margin:0;font-weight:900}.swipe-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}.swipe-actions button{min-height:90px;border-radius:24px;font-size:clamp(1.2rem,1.8vw,1.8rem);font-weight:900;color:#fff}.include{background:var(--green)}.later{background:var(--blue)}.notneeded{background:var(--navy)}.swipe-progress{text-align:center;margin-top:16px;font-size:1.4rem;font-weight:900;color:var(--muted)}
    @media(max-width:900px){.progress-wrap{display:none}.header{grid-template-columns:1fr}.header-side{display:none}.intro-blue{display:none}.nav{grid-template-columns:1fr}.tile{min-height:92px}.topbar-inner{width:min(100% - 24px,1700px)}.container{width:min(100% - 24px,1700px)}.h1{font-size:clamp(3.4rem,15vw,6rem)}.intro-card,.intro-content{min-height:calc(100vh - 145px)}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div><div class="brand-kicker">University of Salford</div><div class="brand-title">SPL Feedback questionnaire</div></div>
      <div class="progress-wrap"><div class="progress-track"><div id="progressFill" class="progress-fill"></div></div><div id="progressNumber" class="progress-number">0%</div></div>
    </div>
  </header>
  <main class="container">
    <div id="tabs" class="tabs"></div>
    <div id="app"></div>
  </main>
<script>
const GOOGLE_SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxJ8YAwk6NFHkI4xVp7s8PT7uZpDHpqioc0XzfB6GjXOD91R9Jbsd0MPf4Y1UWuNaRK/exec";
const screens = [
 {id:'start',label:'Start',type:'start',title:'Welcome!',copy:'We’re gathering your views to shape the future of Simulated Practice Learning (SPL), the digital portfolio, and communication between practice and the university.\n\nThis will take 3–5 minutes.\n\nTap to begin.'},
 {id:'field',label:'1',type:'single',section:'Your Role & Field',title:'Select your field',subtitle:'Tap one.',key:'field',options:['Adult','CYP','Mental Health','Learning Disabilities','Other'],other:true},
 {id:'role',label:'2',type:'single',section:'Your Role & Field',title:'Select your role',subtitle:'Tap one.',key:'role',options:['Practice Supervisor','Practice Assessor','Clinical Educator','Ward/Team Manager','AHP / MDT colleague','Other'],other:true},
 {id:'splTop3',label:'3',type:'multiLimit',section:'Top SPL Priorities — Forced Choice',title:'Choose your TOP 3 SPL priorities',subtitle:'You must pick three only. Tiles grey out after three selections.',key:'topSplPriorities',limit:3,options:['Deterioration recognition','Medicines safety','Communication & escalation','Trauma-informed practice','Safeguarding','MDT working','Paediatric assessment (CYP only)','MH crisis & de-escalation (MH only)','End-of-life care','Leadership & delegation','Complex discharge','Physical health skills for MH students']},
 {id:'structure',label:'4',type:'singleCards',section:'Simulation Structure Preferences',title:'Choose ONE model you prefer',subtitle:'Forced choice. Tap one large tile.',key:'simulationStructure',options:[{title:'Scaffolded model',desc:'Year 1 basics → Year 2 complex care → Year 3 leadership & transition to RN'},{title:'Flexible model',desc:'Any proficiency can be taught at any time, responsive to practice needs'},{title:'Hybrid model',desc:'Core scaffold + flexible elements'}]},
 {id:'logistics',label:'5',type:'multiLimit',section:'Simulation Logistics — Quick Priorities',title:'Pick your TOP 2 preferences',subtitle:'You must pick two only.',key:'logisticsPreferences',limit:2,options:['SPL before placements','SPL embedded in modules','Field-specific SPL blocks','Mixed-field simulation','Interprofessional simulation','Distributed sessions across the year','Blocked SPL weeks']},
 {id:'innovation',label:'6',type:'swipe',section:'New Areas of Simulation — Swipe Cards',title:'Swipe to rate each innovation',subtitle:'Swipe right = Include. Swipe left = Not needed. Swipe up = Explore later.',key:'innovationRatings',cards:['Virtual wards','Tele-health consultations','Remote monitoring','Community/home-based simulation','Digital triage','AI-supported decision-making','Family-centred tele-health (CYP)','Remote MH assessments (MH)']},
 {id:'support',label:'7',type:'multiLimit',section:'How SPL Can Support Supervisors & Assessors',title:'Choose your TOP 3 ways SPL should support you',subtitle:'Three only.',key:'supportWays',limit:3,options:['Prepare students with baseline skills','Improve communication & escalation','Build confidence before placement','Reduce teaching duplication','Provide evidence for assessment','Highlight areas needing support','Improve professionalism','Strengthen MDT readiness']},
 {id:'portfolio',label:'8',type:'multiLimit',section:'Digital Portfolio — What PARE Doesn’t Show',title:'Choose your TOP 4 items you want in the digital portfolio',subtitle:'Four only.',key:'portfolioItems',limit:4,options:['Simulation performance summaries','Skills tracker (Annex A/B)','Professional behaviours over time','Student confidence ratings','Growth narrative','Academic milestones','Cross-field competence','Readiness indicators','Student goals for next placement','Facilitator feedback','Video evidence (optional)']},
 {id:'communication',label:'9',type:'single',section:'Communication Between Practice & University',title:'Choose your preferred communication method',subtitle:'One only.',key:'communicationMethod',options:['Portfolio dashboard','Simulation → practice handover summary','Email updates','Shared digital space','Termly practice–simulation meetings','Alerts for concerns']},
 {id:'arrival',label:'10',type:'multiLimit',section:'Communication Between Practice & University',title:'Choose your TOP 2 items you want to know BEFORE a student arrives',subtitle:'Two only.',key:'beforeStudentArrives',limit:2,options:['Skills achieved','Areas of low confidence','Simulation performance','Professional behaviours','Academic progress','Readiness indicators']},
 {id:'finalInput',label:'11',type:'text',section:'Final Input',title:'One final question',subtitle:'Optional typing.',key:'finalComment',prompt:'What else would help you support students more effectively?'},
 {id:'thanks',label:'Done',type:'thanks',title:'Thank you for your feedback.',copy:'Your input directly shapes the new curriculum, SPL design, and digital portfolio.\n\nTap to finish.'}
];
let page = 0;
let touchStart = null;
const responses = JSON.parse(localStorage.getItem('splFeedbackResponses') || '{}');
function save(){localStorage.setItem('splFeedbackResponses',JSON.stringify(responses));}
function scrollTop(){window.scrollTo({top:0,left:0,behavior:'smooth'});}
function selectedArray(key){if(!Array.isArray(responses[key])) responses[key]=[]; return responses[key];}
function isComplete(i){const s=screens[i]; if(s.type==='start'||s.type==='text'||s.type==='thanks') return true; if(s.type==='single'||s.type==='singleCards') return !!responses[s.key]; if(s.type==='multiLimit') return selectedArray(s.key).length===s.limit; if(s.type==='swipe') return s.cards.every(c=>responses[s.key]&&responses[s.key][c]); return false;}
function progress(){const required=screens.filter(s=>!['start','text','thanks'].includes(s.type)); const done=required.filter(s=>isComplete(screens.indexOf(s))).length; return Math.round(done/required.length*100);}
function renderTabs(){document.getElementById('tabs').innerHTML=screens.map((s,i)=>`<button class="tab ${i===page?'active':''} ${isComplete(i)&&i!==page?'done':''}" onclick="go(${i})">${s.label}</button>`).join('');}
function shell(s,body){return `<section class="screen active"><div class="card"><div class="header"><div class="header-main"><div class="pill">${s.label}</div><h1 class="title">${s.title}</h1><p class="subtitle">${s.subtitle||s.section||''}</p></div><div class="header-side"><div><div class="big">${s.label}</div><div class="small">section</div></div></div></div><div class="body">${body}</div></div>${nav()}</section>`;}
function nav(){const lastQuestion=page===screens.length-2; return `<div class="nav"><button class="back" ${page===0?'disabled':''} onclick="back()">Back</button><button class="${lastQuestion?'finish':'next'}" onclick="next()">${lastQuestion?'Submit':'Next page'}</button><button class="reset" onclick="resetAll()">Reset</button></div>`;}
function startScreen(s){return `<section class="screen active"><div class="card intro-card"><div class="intro-blue"></div><div class="intro-content"><div><div class="brand-kicker">University of Salford</div><p class="kicker">Simulated Practice Learning</p><h1 class="h1">${s.title}</h1><p class="intro-copy">${s.copy.replaceAll('\n','<br>')}</p></div><button class="start" style="min-height:120px;border-radius:28px;font-size:clamp(2rem,4vw,4rem);font-weight:900;max-width:900px;" onclick="next()">Start questionnaire</button></div></div></section>`;}
function tile(label,selected,disabled,onclick,desc=''){return `<button class="tile ${selected?'selected':''} ${disabled&&!selected?'disabled':''}" ${disabled&&!selected?'disabled':''} onclick="${onclick}">${label}${desc?`<span class="meta">${desc}</span>`:''}</button>`;}
function singleScreen(s){let body=`<p class="status">Tap one option.</p><div class="grid">`; body+=s.options.map(o=>tile(o,responses[s.key]===o,false,`chooseSingle('${s.key}', '${escapeJs(o)}')`)).join(''); body+=`</div>`; if(s.other){body+=`<input class="other-input ${responses[s.key]==='Other'?'visible':''}" id="other_${s.key}" placeholder="Type your answer here..." value="${escapeHtml(responses[s.key+'_other']||'')}" oninput="setOther('${s.key}',this.value)">`;} body+=`<div id="notice" class="notice"></div>`; return shell(s,body);}
function singleCardsScreen(s){let body=`<p class="status">Tap one model.</p><div class="grid">`; body+=s.options.map(o=>tile(o.title,responses[s.key]===o.title,false,`chooseSingle('${s.key}', '${escapeJs(o.title)}')`,o.desc)).join(''); body+=`</div><div id="notice" class="notice"></div>`; return shell(s,body);}
function multiScreen(s){const arr=selectedArray(s.key); const full=arr.length>=s.limit; let body=`<p class="status">${arr.length} of ${s.limit} selected.</p><div class="grid">`; body+=s.options.map(o=>tile(o,arr.includes(o),full&&!arr.includes(o),`toggleMulti('${s.key}', '${escapeJs(o)}', ${s.limit})`)).join(''); body+=`</div><div id="notice" class="notice"></div>`; return shell(s,body);}
function swipeScreen(s){if(!responses[s.key]) responses[s.key]={}; const idx=s.cards.findIndex(c=>!responses[s.key][c]); const done=idx===-1; let body=''; if(done){body=`<p class="status">All innovation cards have been rated.</p><div class="grid">${s.cards.map(c=>tile(c+': '+responses[s.key][c],true,false,'void(0)')).join('')}</div>`;} else {const card=s.cards[idx]; body=`<p class="status">Card ${idx+1} of ${s.cards.length}</p><div class="card-stack"><div id="swipeCard" class="swipe-card" onpointerdown="pointerDown(event)" onpointerup="pointerUp(event, '${escapeJs(s.key)}', '${escapeJs(card)}')"><h2>${card}</h2></div></div><div class="swipe-actions"><button class="notneeded" onclick="rateCard('${s.key}','${escapeJs(card)}','Not needed')">← Not needed</button><button class="later" onclick="rateCard('${s.key}','${escapeJs(card)}','Explore later')">↑ Explore later</button><button class="include" onclick="rateCard('${s.key}','${escapeJs(card)}','Include')">Include →</button></div><div class="swipe-progress">Swipe or tap a rating.</div>`;} body+=`<div id="notice" class="notice"></div>`; return shell(s,body);}
function textScreen(s){return shell(s,`<p class="question-prompt">${s.prompt}</p><textarea id="finalText" placeholder="Type here if you would like to add anything..." oninput="responses['${s.key}']=this.value;save()">${escapeHtml(responses[s.key]||'')}</textarea>`);}
function thanksScreen(s){const status=responses._submitStatus || 'Submitting your response...'; return `<section class="screen active"><div class="card intro-card"><div class="intro-blue"></div><div class="intro-content"><div><div class="brand-kicker">University of Salford</div><h1 class="h1">${s.title}</h1><p class="intro-copy">${s.copy.replaceAll('\n','<br>')}</p><p class="submit-status" id="submitStatus">${status}</p></div><button class="finish" style="min-height:120px;border-radius:28px;font-size:clamp(2rem,4vw,4rem);font-weight:900;max-width:900px;" onclick="finish()">Finish</button></div></div></section>`;}
function render(){renderTabs(); const s=screens[page]; let html=''; if(s.type==='start') html=startScreen(s); if(s.type==='single') html=singleScreen(s); if(s.type==='singleCards') html=singleCardsScreen(s); if(s.type==='multiLimit') html=multiScreen(s); if(s.type==='swipe') html=swipeScreen(s); if(s.type==='text') html=textScreen(s); if(s.type==='thanks') html=thanksScreen(s); document.getElementById('app').innerHTML=html; const p=progress(); document.getElementById('progressFill').style.width=p+'%'; document.getElementById('progressNumber').textContent=p+'%'; save();}
function go(i){page=i; render(); scrollTop();}
function back(){if(page>0)go(page-1);}
function next(){const s=screens[page]; if(s.type==='single'||s.type==='singleCards'){if(!responses[s.key]) return showNotice('Please select one option before moving on.'); if(responses[s.key]==='Other'&&!String(responses[s.key+'_other']||'').trim()) return showNotice('Please type your “Other” response before moving on.');}
 if(s.type==='multiLimit'){const arr=selectedArray(s.key); if(arr.length!==s.limit) return showNotice(`Please select exactly ${s.limit} option${s.limit>1?'s':''} before moving on.`);} if(s.type==='swipe'&&!isComplete(page)) return showNotice('Please rate every card before moving on.'); if(page===screens.length-2){submitResponses();} go(Math.min(page+1,screens.length-1));}
function chooseSingle(key,value){responses[key]=value; if(value!=='Other') delete responses[key+'_other']; save(); render();}
function setOther(key,value){responses[key]='Other'; responses[key+'_other']=value; save();}
function toggleMulti(key,value,limit){const arr=selectedArray(key); const i=arr.indexOf(value); if(i>=0) arr.splice(i,1); else if(arr.length<limit) arr.push(value); save(); render();}
function rateCard(key,card,rating){if(!responses[key]) responses[key]={}; responses[key][card]=rating; save(); render();}
function pointerDown(e){touchStart={x:e.clientX,y:e.clientY};}
function pointerUp(e,key,card){if(!touchStart)return; const dx=e.clientX-touchStart.x, dy=e.clientY-touchStart.y; touchStart=null; if(Math.abs(dx)<45&&Math.abs(dy)<45)return; if(Math.abs(dy)>Math.abs(dx)&&dy<-45) rateCard(key,card,'Explore later'); else if(dx>45) rateCard(key,card,'Include'); else if(dx<-45) rateCard(key,card,'Not needed');}
function showNotice(msg){const n=document.getElementById('notice'); if(n){n.textContent=msg;n.classList.add('visible');} else alert(msg);}
function resetAll(){if(confirm('Reset the questionnaire for the next person?')){localStorage.removeItem('splFeedbackResponses'); Object.keys(responses).forEach(k=>delete responses[k]); page=0; render(); scrollTop();}}
function finish(){resetAll();}
function buildPayload(){const flat={}; screens.forEach(s=>{if(s.type==='single'||s.type==='singleCards'){flat[s.title]=responses[s.key]==='Other' ? responses[s.key+'_other'] : (responses[s.key]||'');} if(s.type==='multiLimit'){flat[s.title]=selectedArray(s.key).join('; ');} if(s.type==='swipe'){s.cards.forEach(c=>flat[c]=responses[s.key]?.[c]||'');} if(s.type==='text'){flat[s.prompt]=responses[s.key]||'';}}); return {questionnaire:'SPL Feedback questionnaire',submittedAt:new Date().toISOString(),flatAnswers:flat,rawResponses:responses};}
async function submitResponses(){responses._submitStatus='Sending responses to Google Sheets...'; save(); try{await fetch(GOOGLE_SHEETS_WEB_APP_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(buildPayload())}); responses._submitStatus='Responses sent. Thank you.';}catch(e){responses._submitStatus='The response could not be sent automatically. Please tell a member of staff.';} save(); if(page===screens.length-1){const el=document.getElementById('submitStatus'); if(el)el.textContent=responses._submitStatus;}}
function escapeHtml(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function escapeJs(str){return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
render();
</script>
</body>
</html>
